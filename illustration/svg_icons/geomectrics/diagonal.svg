<svg width="1" height="1" xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 100 100"
     style="width:100%; height:auto; aspect-ratio:1/1;">

  <defs>
    <g id="band">
      <rect x="30" y="-30" width="40" height="160"
            transform="rotate(45 50 50)"/>
    </g>
  </defs>

  <!-- tuile centrale -->
  <use href="#band" fill="#000"/>

  <!-- voisins horizontaux -->
  <use href="#band" x="-100" fill="#000"/>
  <use href="#band" x="100" fill="#000"/>

  <!-- voisins verticaux -->
  <use href="#band" y="-100" fill="#000"/>
  <use href="#band" y="100" fill="#000"/>

  <!-- diagonales -->
  <use href="#band" x="-100" y="-100" fill="#000"/>
  <use href="#band" x="100" y="-100" fill="#000"/>
  <use href="#band" x="-100" y="100" fill="#000"/>
  <use href="#band" x="100" y="100" fill="#000"/>

</svg>